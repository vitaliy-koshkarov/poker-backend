<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Spring Boot WebSocket STOMP test</title>
    <script src="libs/sockjs.min.js"></script>
    <script src="libs/stomp_2.3.3.min.js"></script>
    <script src="js/client.js"></script>
</head>

<body>
<h2>WebSocket STOMP chat</h2>
<div>
    <button id="connectBtn" type="button" onclick="connectToChat()">Connect</button>
    <button id="disconnectBtn" type="button" onclick="disconnectFromChat()" disabled="disabled">Disconnect</button>

    <div style="margin-top: 20px">
        <label for="messageInput">
            <input type="text" id="messageInput" placeholder="Enter your name" disabled="disabled"/>
        </label>
        <button id="sendBtn" onclick="sendMessage()" disabled="disabled">Send</button>
    </div>
</div>

<div style="margin-top: 14px">Messages:</div>
<pre id="chat"></pre>

</body>
</html>
